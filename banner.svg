<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&amp;family=Inter:wght@700;900&amp;display=swap');
      .bg { fill: #050505; }
      .first-name { font-family: 'Caveat', 'Brush Script MT', cursive; font-size: 110px; fill: #e4002b; }
      .last-name { font-family: 'Inter', 'Arial Black', sans-serif; font-size: 110px; font-weight: 900; fill: #ffffff; letter-spacing: -3px; }
      .role { font-family: 'Inter', 'Arial', sans-serif; font-size: 28px; font-weight: 700; fill: #ffffff; }
      .tech-stack { font-family: 'Inter', 'Arial', sans-serif; font-size: 20px; font-weight: 700; fill: #a0a0a0; letter-spacing: 5px; }
    </style>
  </defs>
  
  <rect width="1000" height="400" class="bg"/>

  <!-- Left Side: Abstract Logo & Role -->
  <g transform="translate(250, 160)">
    <!-- Red Logo Abstract Design -->
    <path d="M-30,-70 Q10,-120 40,-40 Q70,-110 80,-30 Q60,60 0,60 Q-60,60 -80,-30 Q-70,-110 -40,-40 Q-10,-120 -30,-70 Z" fill="#e4002b" transform="scale(1.2)"/>
    <text x="0" y="130" class="role" text-anchor="middle">Full-Stack Developer</text>
  </g>

  <!-- Right Side: Name -->
  <g transform="translate(720, 180)">
    <text x="-90" y="-40" class="first-name" text-anchor="middle" transform="rotate(-8)">Kunal</text>
    <text x="0" y="55" class="last-name" text-anchor="middle">KAMOD</text>
  </g>

  <!-- Bottom: Tech Stack -->
  <text x="500" y="360" class="tech-stack" text-anchor="middle">
    NEXT.JS  •  REACT  •  NODE.JS  •  EXPRESS  •  MONGODB  •  AWS  •  C++
  </text>
</svg>
